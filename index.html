<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buscador de Times</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="./favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="./favicon/favicon.svg" />
    <link rel="shortcut icon" href="./favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./favicon/apple-touch-icon.png" />
    <link rel="manifest" href="./favicon/site.webmanifest" />
  </head>
  <body>
    <div class="container">
      <header class="search-section">
        <h1>Buscador de Clubes</h1>
        <p>Pesquise por times do mundo inteiro para ver suas estatísticas.</p>

        <div class="search-box">
          <input
            type="text"
            id="searchInput"
            placeholder="Digite o nome do time (ex: Flamengo, Real Madrid)..."
          />
          <button id="searchButton">Buscar</button>
        </div>

        <div id="statusMessage" class="status-message hidden">
          Buscando informações...
        </div>
      </header>

      <main id="teamCard" class="team-card">
      </main>

      <footer class="footer">
        <p>Desenvolvido por <strong>Richard Braga</strong> | Técnico em informático pelo Instituto Federal de Alagoas (IFAL) | Atividade orientada pelo Prof. da UFAL <strong>Italo Carlo</strong> | Dados via TheSportsDB API</p>
      </footer>
    </div>
  </body>
  <script type="module" src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"></script>
  <script src="script.js"></script>
</html>
